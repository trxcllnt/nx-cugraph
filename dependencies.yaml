# Dependency list for https://github.com/rapidsai/dependency-file-generator
files:
  all:
    output: [conda]
    matrix:
      cuda: ["12.9", "13.3"]
      arch: [x86_64, aarch64]
    includes:
      - checks
      - cuda_version
      - python_build_rapids
      - python_build_wheel
      - test_python_common
      - python_run_nx_cugraph
      - depends_on_pylibcugraph
      - test_python_nx_cugraph
      - depends_on_cupy
      - depends_on_cudf
  checks:
    output: none
    includes:
      - checks
      - py_version
  test_notebooks:
    output: none
    includes:
      - cuda_version
      - py_version
      - test_notebook
  test_python:
    output: none
    includes:
      - cuda_version
      - depends_on_cudf
      - py_version
      - test_python_common
      - test_python_nx_cugraph
      - depends_on_nx_cugraph
  py_build_nx_cugraph:
    output: pyproject
    pyproject_dir: .
    extras:
      table: build-system
    includes:
      - python_build_rapids
      - python_build_wheel
  py_run_nx_cugraph:
    output: pyproject
    pyproject_dir: .
    extras:
      table: project
    includes:
      - depends_on_pylibcugraph
      - depends_on_cupy
      - python_run_nx_cugraph
  py_test_nx_cugraph:
    output: pyproject
    pyproject_dir: .
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - depends_on_cudf
      - test_python_common
      - test_python_nx_cugraph
channels:
  - rapidsai-nightly
  - rapidsai
  - conda-forge
dependencies:
  checks:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
  # 'cuda_version' intentionally does not contain fallback entries... we want
  # a loud error if an unsupported 'cuda' value is passed
  cuda_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              cuda: "12.2"
            packages:
              - cuda-version=12.2
          - matrix:
              cuda: "12.5"
            packages:
              - cuda-version=12.5
          - matrix:
              cuda: "12.8"
            packages:
              - cuda-version=12.8
          - matrix:
              cuda: "12.9"
            packages:
              - cuda-version=12.9
          - matrix:
              cuda: "13.0"
            packages:
              - cuda-version=13.0
          - matrix:
              cuda: "13.1"
            packages:
              - cuda-version=13.1
          - matrix:
              cuda: "13.2"
            packages:
              - cuda-version=13.2
          - matrix:
              cuda: "13.3"
            packages:
              - cuda-version=13.3
      - output_types: requirements
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              # some components (like nvidia-cublas-cu12 and nvidia-cuda-nvcc-cu12) didn't have
              # aarch64 wheels until CTK 12.3, so allow a slightly looser bound here
              - cuda-toolkit>=12.2,<12.4
          - matrix:
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.2.*
          - matrix:
              cuda: "12.5"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.5.*
          - matrix:
              cuda: "12.8"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.8.*
          - matrix:
              cuda: "12.9"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.9.*
          - matrix:
              cuda: "13.0"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.0.*
          - matrix:
              cuda: "13.1"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.1.*
          - matrix:
              cuda: "13.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.2.*
          - matrix:
              cuda: "13.3"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.3.*
  depends_on_nx_cugraph:
    common:
      - output_types: conda
        packages:
          - nx-cugraph==26.8.*,>=0.0.0a0
  py_version:
    specific:
      - output_types: [conda]
        matrices:
          - matrix:
              py: "3.11"
            packages:
              - python=3.11
          - matrix:
              py: "3.12"
            packages:
              - python=3.12
          - matrix:
              py: "3.13"
            packages:
              - python=3.13
          - matrix:
              py: "3.14"
            packages:
              - python=3.14
          - matrix:
            packages:
              - python>=3.11
  python_build_rapids:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - rapids-build-backend>=0.4.0,<0.5.0
  python_build_wheel:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - setuptools>=77.0.0
          - wheel
  test_notebook:
    common:
      - output_types: [conda, requirements]
        packages:
          - ipython
          - notebook>=0.5.0
  test_python_common:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - pandas
          - pytest
          - pytest-benchmark
          - pytest-cov
          - pytest-xdist
          - scipy
  python_run_nx_cugraph:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - networkx>=3.2
          - &numpy numpy>=1.23,<3.0
  test_python_nx_cugraph:
    common:
      # This is intentionally only defined for [conda], to avoid unnecessarily installing 'pytest-mpl'
      # in wheel-based CI (where the networkx tests are not run).
      - output_types: [conda]
        packages:
          # not needed by nx-cugraph tests, but is required for running networkx tests
          - pytest-mpl
  depends_on_cupy:
    common:
      - output_types: conda
        packages:
          - cupy>=13.6.0
    # NOTE: This is intentionally not broken into groups by a 'cuda_suffixed' selector like
    #       other packages with -cu{nn}x suffixes in this file.
    #       All RAPIDS wheel builds (including in devcontainers) expect cupy to be suffixed.
    specific:
      - output_types: [pyproject, requirements]
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x>=13.6.0
          # fallback to CUDA 13 versions if 'cuda' is '13.*' or not provided
          - matrix:
            packages:
              - cupy-cuda13x>=13.6.0
  depends_on_cudf:
    common:
      - output_types: conda
        packages:
          - &cudf_unsuffixed cudf==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [pyproject, requirements]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*cudf_unsuffixed]}
  depends_on_pylibcugraph:
    common:
      - output_types: conda
        packages:
          - &pylibcugraph_unsuffixed pylibcugraph==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [pyproject, requirements]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*pylibcugraph_unsuffixed]}
